<html>

        <style>
            .questionaire-results-chart {
                width: 100%;
                max-width: 800px; /* Maximale Breite */
                margin: 0 auto;
            }

            .questionaire-results-bar-container {
                margin-bottom: 20px;
            }

            .questionaire-results-bar-label {
                display: block;
                font-weight: bold;
                margin-bottom: 5px;
            }

            .questionaire-results-bar-row {
                display: flex;
                align-items: left;
                gap: 10px;
            }

            .questionaire-results-bar {
                height: 30px;
                background-color: #4CAF50;
                border-radius: 4px;
                min-width: 2px;
            }

            .questionaire-results-bar-value {
                font-size: 14px;
                color: #9c9c9c;
                white-space: nowrap; /* Verhindert Zeilenumbruch */
                flex-shrink: 0; /* Verhindert Schrumpfen */
                padding-top: 8px;
            }

            /* Responsive Anpassungen */
            @media (max-width: 768px) {
                .questionaire-results-chart {
                    max-width: 95%;
                    padding: 0 10px;
                }
            }

            @media (max-width: 480px) {
                .questionaire-results-chart {
                    max-width: 100%;
                    padding: 0 5px;
                }
                
                .questionaire-results-bar {
                    height: 25px;
                }
                
                .questionaire-results-bar-value {
                    font-size: 12px;
                }
            }

            .rating-grid-auto-wrapper {
                text-align: center;
            }

            .rating-grid-auto-container {
                display: inline-grid;
                grid-template-columns: repeat(4, auto);
                justify-content: center;
            }

            .rating-grid-auto-container button {
                width: 40px;
                height: 40px;
                background-color: #3545dc;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                font-size: 14px;
                margin: 0 20px;
            }

            .rating-grid-auto-container button:hover {
                background-color: #c82333;
            }

            .rating-grid-auto-text {
                grid-column: 1 / -1;
                display: flex;
                justify-content: space-between;
            }

        </style>
        <script src="http://localhost:8080/wp-includes/js/jquery/jquery.min.js?ver=3.7.1" id="jquery-core-js"></script>

    <script>
        // http://localhost:8080/wp-content/plugins/custom/diagram.html?perfekt=12&harmonie=7&kampf=2&plan=2&unabhaengig=14
		jQuery(document).ready(function($) {
            const resultTypes = [
                {"result_id":"perfekt","result_title":"Die innere Stimme der Perfektionistin","_id":"ce90b25"},
                {"result_id":"harmonie","result_title":"Die innere Stimme der Harmonie-Sucherin","_id":"871b48a"},
                {"result_id":"kampf","result_title":"Die innere Stimme der K\u00e4mpferin","_id":"6b1ad12"},
                {"result_id":"plan","result_title":"Die innere Stimme der Planerin","_id":"74996d9"},
                {"result_id":"unabhaengig","result_title":"Die innere Stimme der Unabh\u00e4ngigen","_id":"592ba09"}];

            const params = new URLSearchParams(window.location.search);
            const sumOfPoints = {};
            params.forEach((value, key) => {
                sumOfPoints[key] = value;
            });

            if(!sumOfPoints.hasOwnProperty('perfekt') && !sumOfPoints.hasOwnProperty('harmonie'))
            {
                const example = {"perfekt": 12, "harmonie": 7, "kampf": 2, "plan": 2, "unabhaengig": 14};
                const exparams = new URLSearchParams(example);
                const urlString = exparams.toString();
                console.log(urlString)
                window.location.search = urlString;
                console.log(window.location)
            }
            else{
                let results = getResultsInOrder();
                showResults(results);
            }
            
            function getResultsInOrder() {
                let values = Object.values(sumOfPoints);
                let totalSum = Math.max(...values);
                console.log('totalSum='+totalSum);
                return Object.entries(sumOfPoints)
                    .sort(([,a], [,b]) => b - a)
                    .map(([resultId, score]) => {
                        const resultType = resultTypes.find(r => r.result_id === resultId);
                        return {
                            id: resultId,
                            title: resultType ? resultType.result_title : resultId,
                            description: resultType ? resultType.result_description : '',
                            score: score,
                            percentage: Math.round((score / totalSum) * 100)
                        };
                    });
            }

            function showResults(topResults) {
                let resultsHtml = '<div class="questionaire-results-chart">\n';
				
				topResults.forEach(function(result, index) {
                    resultsHtml +=  '    <div class="questionaire-results-bar-container">\n'+
                                    '        <span class="questionaire-results-bar-label">' + result.title + '</span>\n'+
                                    '        <div class="questionaire-results-bar questionaire-results-bar-value" style="width: ' + result.percentage + '%;">' 
                                                       + result.score + ' Punkt' + (result.score > 1 ? 'e' : '') + '</div>\n'+
                                    '    </div>\n';

				});

                resultsHtml += '</div>';

				$('.results-content').html(resultsHtml);
			}
        });


    </script>
